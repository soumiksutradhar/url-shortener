<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Budget Bank</title>
  <style>
    body { font-family: Arial, sans-serif; max-width: 800px; margin: 40px auto; padding: 0 20px; }
    input, select, button { padding: 8px; margin: 4px; }
    table { width: 100%; border-collapse: collapse; margin-top: 20px; }
    th, td { border: 1px solid #ddd; padding: 8px; text-align: left; }
    th { background: #f4f4f4; }
    #summary { margin-top: 20px; }
  </style>
</head>
<body>
  <h1>Budget Bank</h1>

  <h2>Add Expense</h2>
  <input type="number" id="amount" placeholder="Amount" />
  <input type="text" id="category" placeholder="Category" />
  <input type="date" id="date" />
  <input type="text" id="note" placeholder="Note (optional)" />
  <button onclick="addExpense()">Add</button>

  <h2>Expenses</h2>
  <table>
    <thead>
      <tr><th>Date</th><th>Category</th><th>Amount</th><th>Note</th><th>Action</th></tr>
    </thead>
    <tbody id="expense-list"></tbody>
  </table>

  <h2>Summary</h2>
  <div id="summary"></div>

  <script>
    const API = 'http://localhost:5000';

    async function fetchExpenses() {
      const res = await fetch(`${API}/expenses`);
      const expenses = await res.json();
      const tbody = document.getElementById('expense-list');
      tbody.innerHTML = '';
      expenses.forEach(e => {
        tbody.innerHTML += `
          <tr>
            <td>${e.date}</td>
            <td>${e.category}</td>
            <td>₹${e.amount}</td>
            <td>${e.note}</td>
            <td><button onclick="deleteExpense(${e.id})">Delete</button></td>
          </tr>`;
      });
    }

    async function addExpense() {
      const data = {
        amount: document.getElementById('amount').value,
        category: document.getElementById('category').value,
        date: document.getElementById('date').value,
        note: document.getElementById('note').value
      };
      await fetch(`${API}/expenses`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(data)
      });
      fetchExpenses();
      fetchSummary();
    }

    async function deleteExpense(id) {
      await fetch(`${API}/expenses/${id}`, { method: 'DELETE' });
      fetchExpenses();
      fetchSummary();
    }

    async function fetchSummary() {
      const res = await fetch(`${API}/expenses/summary`);
      const summary = await res.json();
      const div = document.getElementById('summary');
      div.innerHTML = Object.entries(summary)
        .map(([cat, total]) => `<p><strong>${cat}:</strong> ₹${total}</p>`)
        .join('');
    }

    fetchExpenses();
    fetchSummary();
  </script>
</body>
</html>
